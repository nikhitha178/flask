{% extends "base.html" %}

{% block content %}
<!-- Your page content -->

<!DOCTYPE html>
<html>

<head>
    <title>SmartCart - OTP</title>
    <style>
        body {
            background: #f5f5f5;
            font-family: Arial;
        }

        .box {
            width: 350px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }

        input,
        button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            background: #00c4ff;
            border: none;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Verify OTP</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <p style="color:red;">{{ message }}</p>
        {% endfor %}
        {% endwith %}

        <form method="POST" action="/verify-otp">
            <input type="text" name="otp" placeholder="Enter OTP">
            <input type="password" name="password" placeholder="Create Password">
            <button type="submit">Verify</button>
        </form>
    </div>

</body>

</html>
{% endblock %}
