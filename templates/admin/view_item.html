{% extends "base.html" %}

{% block content %}
<!-- Your page content -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Product Details - SmartCart</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #eef2f7, #d9e4f5);
            margin: 0;
        }

        .navbar {
            background: linear-gradient(90deg, #1f1f1f, #3a3a3a);
            color: white;
            padding: 18px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .container {
            width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-bottom: 20px;
        }

        p {
            font-size: 16px;
            margin: 10px 0;
            color: #333;
        }

        strong {
            color: #000;
        }

        .price {
            font-size: 20px;
            font-weight: bold;
            color: #28a745;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #333;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #111;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <h2>Product Details</h2>
    </div>

    <div class="container">

        <img src="/static/uploads/product_image/{{ product.image }}">

        <p><strong>Name:</strong> {{ product.name }}</p>
        <p><strong>Description:</strong> {{ product.description }}</p>
        <p><strong>Category:</strong> {{ product.category }}</p>
        <p class="price">₹{{ product.price }}</p>

        <a href="/admin/item-list" class="back-btn">← Back to List</a>

    </div>

</body>

</html>
{% endblock %}
