{% extends 'base.html' %}
{% block title %}Admin Control Sign In{% endblock %}
{% block content %}
<div class="container">
    <div class="row justify-content-center my-5">
        <div class="col-md-5">
            <div class="card shadow border-0 p-4 rounded-3">
                <div class="text-center mb-4">
                    <div class="bg-dark text-white rounded-circle d-inline-flex p-3 mb-2"><i
                            class="fa-solid fa-lock-open fs-4"></i></div>
                    <h4 class="fw-bold text-dark">Management Terminal</h4>
                    <p class="text-muted small">Enter corporate credentials below to access terminal infrastructure
                        panels.</p>
                </div>
                <form action="/admin-login" method="POST">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Admin Corporate Email Address</label>
                        <input type="email" name="email" class="form-control py-2" placeholder="name@smartcart.com"
                            required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Password Passphrase</label>
                        <input type="password" name="password" class="form-control py-2" placeholder="••••••••••••"
                            required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100 py-2 fw-semibold mb-3">Authenticate Log In</button>
                    <div class="text-center">
                        <span class="small text-muted">New administrator node? <a href="/admin-signup"
                                class="text-decoration-none">Initialize Signup</a></span>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
