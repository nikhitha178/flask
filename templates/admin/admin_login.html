{% extends "base.html" %}

{% block content %}
<!-- Your page content -->

<!DOCTYPE html>
<html lang="en">

<head>
    <title>SmartCart - Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
        }

        .navbar {
            background: #222;
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
        }

        .navbar h1 {
            color: #00c4ff;
            margin: 0;
        }

        .container {
            width: 350px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        input,
        button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            background: #00c4ff;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: black;
            color: white;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <h1>SmartCart</h1>
        <div>
            <a href="/" style="color:white;">Home</a>
        </div>
    </div>

    <div class="container">
        <h2>Admin Login</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <p style="color:red;">{{ message }}</p>
        {% endfor %}
        {% endwith %}

        <form method="POST" action="/admin-login">
            <input type="email" name="email" placeholder="Enter Email" required>
            <input type="password" name="password" placeholder="Enter Password" required>
            <button type="submit">Login</button>
        </form>
    </div>

</body>

</html>
{% endblock %}
