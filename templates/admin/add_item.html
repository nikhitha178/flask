{% extends "base.html" %}

{% block content %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Add Item - SmartCart</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #eef2f7, #d9e4f5);
            margin: 0;
        }

        .navbar {
            background: linear-gradient(90deg, #1f1f1f, #3a3a3a);
            color: white;
            padding: 18px 30px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .container {
            width: 420px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: #00c4ff;
            box-shadow: 0 0 5px rgba(0, 196, 255, 0.4);
        }

        textarea {
            height: 100px;
            resize: none;
        }

        input[type="file"] {
            background: #f9f9f9;
            border: 1px dashed #00c4ff;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #00c4ff, #0096ff);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: linear-gradient(90deg, #0096ff, #007acc);
        }

        /* View button style */
        .view-btn {
            display: block;
            text-align: center;
            margin-top: 15px;
            padding: 12px;
            background: #333;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
        }

        .view-btn:hover {
            background: #111;
        }

        .flash {
            text-align: center;
            padding: 10px;
            margin: 10px auto;
            width: 420px;
            border-radius: 6px;
        }

        .flash.success {
            background: #d4edda;
            color: #155724;
        }

        .flash.danger {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <h2>Add Product</h2>
    </div>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <div class="container">
        <form method="POST" action="/admin/add-item" enctype="multipart/form-data">

            <input type="text" name="name" placeholder="Product Name" required>

            <textarea name="description" placeholder="Description" required></textarea>

            <select name="category" required>
                <option value="">Select Category</option>
                <option value="electronics">Electronics</option>
                <option value="fashion">Fashion</option>
                <option value="groceries">Groceries</option>
                <option value="home">Home</option>
            </select>

            <input type="text" name="price" placeholder="Price" required>

            <input type="file" name="image" accept="image/*" required>

            <button type="submit">Add Item</button>
        </form>

        <!-- VIEW ITEMS BUTTON -->
        <a href="/admin/item-list" class="view-btn">View Items</a>
    </div>

</body>

</html>
{% endblock %}
