{% extends 'base_admin.html' %}
{% block title %}Add New Item{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow border-0 rounded-3">
            <div class="card-header bg-white py-3 border-bottom">
                <h5 class="mb-0 fw-bold text-dark"><i class="fa-solid fa-circle-plus text-primary me-2"></i>Create New
                    Product Entry</h5>
            </div>
            <div class="card-body p-4">
                <form action="/admin/add-item" method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Product Title</label>
                        <input type="text" name="name" class="form-control"
                            placeholder="e.g., Wireless Noise-Cancelling Headphones" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">Category Classification</label>
                            <select name="category" class="form-select" required>
                                <option value="" disabled selected>Choose target market vertical...</option>
                                <option value="Electronics">Electronics</option>
                                <option value="Apparel">Apparel</option>
                                <option value="Home Goods">Home Goods</option>
                                <option value="Fitness">Fitness</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">Retail Price (INR)</label>
                            <div class="input-group">
                                <span class="input-group-text">₹</span>
                                <input type="number" step="0.01" name="price" class="form-control" placeholder="0.00"
                                    required>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Product Specifications / Summary Description</label>
                        <textarea name="description" class="form-control" rows="4"
                            placeholder="Detail standard operational parameters, sizing layout grids, warranties..."
                            required></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">High-Resolution Display Image Assets</label>
                        <input type="file" name="image" class="form-control" accept="image/*" required>
                        <div class="form-text">Supported formats: PNG, JPG, JPEG, WEBP.</div>
                    </div>
                    <div class="d-flex justify-content-end gap-2">
                        <a href="/admin/item-list" class="btn btn-light px-4 border">Cancel Asset Creation</a>
                        <button type="submit" class="btn btn-primary px-4">Publish Item Live</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
