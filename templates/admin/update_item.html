{% extends 'base_admin.html' %}
{% block title %}Modify Active Catalog Asset Configurations{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow border-0 rounded-3">
            <div class="card-header bg-white py-3 border-bottom d-flex align-items-center justify-content-between">
                <h5 class="mb-0 fw-bold text-dark"><i class="fa-solid fa-sliders text-warning me-2"></i>Edit Product
                    Matrix Parameters</h5>
                <span class="badge bg-dark">ID Vector: #{{ product.product_id }}</span>
            </div>
            <div class="card-body p-4">
                <form action="/admin/update-item/{{ product.product_id }}" method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Product Title Identifier</label>
                        <input type="text" name="name" class="form-control" value="{{ product.name }}" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">Category Classification Vertical</label>
                            <input type="text" name="category" class="form-control" value="{{ product.category }}"
                                required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">Retail Listing Price Target (INR)</label>
                            <div class="input-group">
                                <span class="input-group-text">₹</span>
                                <input type="number" step="0.01" name="price" class="form-control"
                                    value="{{ product.price }}" required>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Asset Detailed Specification Logs Summary Text
                            Block</label>
                        <textarea name="description" class="form-control" rows="4"
                            required>{{ product.description }}</textarea>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold d-block mb-2">Historical Active Rendering Image
                            Asset</label>
                        <div class="d-flex align-items-center gap-3 border p-2.5 rounded bg-light mb-2">
                            <img src="{{ url_for('static', filename='uploads/product_image/' + product.image) }}"
                                class="rounded shadow-sm" style="width: 65px; height: 65px; object-fit: cover;">
                            <span class="text-muted small fw-mono text-truncate">{{ product.image }}</span>
                        </div>
                        <label class="form-label small fw-bold text-secondary">Upload Substitute Image Binary Stream
                            File <span class="fw-normal text-muted">(Leave completely blank to preserve current file
                                pointer asset unchanged)</span></label>
                        <input type="file" name="image" class="form-control" accept="image/*">
                    </div>
                    <div class="d-flex justify-content-end gap-2">
                        <a href="/admin/item-list" class="btn btn-light px-4 border">Abort Matrix Updates</a>
                        <button type="submit" class="btn btn-warning px-4 text-dark fw-semibold">Commit Configuration
                            Overwrites</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
